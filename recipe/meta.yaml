{% set name = "Flask-Caching" %}
{% set version = "2.0.1" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 10df200a03f032af60077befe41779dd94898b67c82040d34e87210b71ba2638

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv "
  skip: True # [py<37]

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - cachelib >=0.9.0
    - flask <3


test:
  imports:
    - flask_caching
    - flask_caching.backends
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://flask-caching.readthedocs.io/en/latest/
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Adds caching support to your Flask application
  description: A fork of the Flask-cache extension which adds easy cache support to Flask.
  doc_url: https://flask-caching.readthedocs.io/en/latest/
  dev_url: https://github.com/sh4nks/flask-caching

extra:
  recipe-maintainers:
    - halldc
